<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1280 520" role="img" aria-label="gather README hero for Project Telos. Bring difficult sources in, and keep how they arrived on the record.">
  <title>gather Project Telos hero</title>
  <desc>gather README hero for Project Telos. Bring difficult sources in, and keep how they arrived on the record.</desc>
  <rect width="1280" height="520" rx="34" fill="#f4f3ef"/>
  <path d="M80 96 H1200 M80 424 H1200" stroke="#0b0c0e" stroke-opacity=".14"/>
  <text x="80" y="86" font-family="ui-monospace, SFMono-Regular, Menlo, Consolas, monospace" font-size="20" letter-spacing="6" fill="#585c64">PROJECT TELOS / ACCOUNTABLE RESEARCH INTAKE</text>
  <text x="76" y="334" font-family="Arial Black, Impact, system-ui, sans-serif" font-size="182" letter-spacing="0" fill="#0b0c0e" fill-opacity=".08">GATHER</text>
