name: Release

on:
  push:
    tags: ["v*"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: Verify the wheel installs and runs clean
        run: |
          python -m venv /tmp/v
          /tmp/v/bin/pip install dist/*.whl
          /tmp/v/bin/gather --version
          /tmp/v/bin/python -c "from gather import make_item, digest, verify_digest; it = make_item(kind='document', id='a', title='A', text='x', source='web', ref='a', method='http-get', fetched_at=0.0); assert verify_digest(digest([it]))"
      - uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # trusted publishing (OIDC); no API token stored
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
